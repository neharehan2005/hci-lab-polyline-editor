<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HCI Polyline Editor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Polyline Editor</h1>

    <canvas id="canvas" width="800" height="500">
    </canvas>

    <script src="script.js"></script>
</body>

</html>
